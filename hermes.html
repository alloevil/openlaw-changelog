<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Agent Changelog</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #16161f;
  --bg-hover: #1c1c28;
  --bg-detail: #1a1a25;
  --border: #232333;
  --border-light: #2a2a3d;
  --text-primary: #e8e8ed;
  --text-secondary: #8b8ba0;
  --text-muted: #5c5c72;
  --accent: #00d68f;
  --accent-glow: rgba(0, 214, 143, 0.12);
  --tag-new: #00d68f;
  --tag-new-bg: rgba(0, 214, 143, 0.12);
  --tag-opt: #4da6ff;
  --tag-opt-bg: rgba(77, 166, 255, 0.12);
  --tag-fix: #ff9f43;
  --tag-fix-bg: rgba(255, 159, 67, 0.12);
  --tag-break: #ff6b6b;
  --tag-break-bg: rgba(255, 107, 107, 0.12);
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 0.2s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10, 10, 15, 0.82);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  max-width: 960px; margin: 0 auto; padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  flex-wrap: wrap;
}

.logo-area { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }

.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), #00b894);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff;
}

.logo-text { font-size: 18px; font-weight: 600; color: var(--text-primary); }
.logo-text span { color: var(--text-muted); font-weight: 400; margin-left: 6px; }

/* Page nav (cross-page links) */
.page-nav { display: flex; gap: 6px; flex-shrink: 0; }
.page-nav a {
  padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500;
  color: var(--text-muted); background: var(--bg-secondary);
  border: 1px solid var(--border); text-decoration: none;
  transition: all var(--transition); white-space: nowrap;
}
.page-nav a:hover { color: var(--text-primary); border-color: var(--accent); }

/* Month nav — scrollable on overflow */
.month-nav-wrap {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.month-nav-wrap::-webkit-scrollbar { display: none; }

.month-nav {
  display: flex; gap: 6px; flex-wrap: nowrap; padding-bottom: 2px;
}

.month-pill {
  padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); background: var(--bg-secondary);
  border: 1px solid var(--border); text-decoration: none;
  transition: all var(--transition); white-space: nowrap; cursor: pointer;
  flex-shrink: 0;
}

.month-pill:hover { color: var(--text-primary); border-color: var(--accent); background: var(--accent-glow); }
.month-pill.active { color: var(--text-primary); border-color: var(--accent); background: var(--accent-glow); }

/* Main */
.main { max-width: 960px; margin: 0 auto; padding: 48px 24px 120px; }

.hero { text-align: center; margin-bottom: 64px; }
.hero h1 {
  font-size: 40px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e8e8ed, #00d68f);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 12px;
}
.hero p { font-size: 17px; color: var(--text-secondary); max-width: 520px; margin: 0 auto; }

/* Month section */
.month-section { margin-bottom: 72px; }

.month-header {
  display: flex; align-items: baseline; gap: 16px;
  margin-bottom: 28px; padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.month-tag { font-size: 24px; font-weight: 700; color: var(--text-primary); }
.month-count { font-size: 14px; color: var(--text-muted); }

.month-content { }
.month-content:not(.expanded) { display: none; }

/* Date group */
.date-group { margin-bottom: 24px; }

.date-header {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; cursor: pointer; user-select: none;
}

.toggle-icon { font-size: 14px; color: var(--text-muted); transition: transform 0.3s; flex-shrink: 0; width: 16px; text-align: center; }
.toggle-icon.expanded { transform: rotate(90deg); }

.date-label { font-size: 16px; font-weight: 600; color: var(--text-primary); }
.date-count { font-size: 13px; color: var(--text-muted); margin-left: auto; }

.date-releases { padding-left: 8px; }
.date-releases:not(.expanded) { display: none; }

/* Category group */
.category-group { margin-bottom: 16px; }

.category-header {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; cursor: pointer; user-select: none;
}

.category-label { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.category-label.tag-new { color: var(--tag-new); }
.category-label.tag-opt { color: var(--tag-opt); }
.category-label.tag-fix { color: var(--tag-fix); }
.category-label.tag-break { color: var(--tag-break); }

.category-count { font-size: 12px; color: var(--text-muted); }

.category-features { padding-left: 8px; }
.category-features:not(.expanded) { display: none; }

/* Feature card */
.feature-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom: 6px;
  transition: all var(--transition);
}
.feature-card:hover { background: var(--bg-hover); border-color: var(--border-light); }

.feature-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer;
}

.expand-icon { font-size: 11px; color: var(--text-muted); transition: transform 0.2s; flex-shrink: 0; }
.feature-card.open .expand-icon { transform: rotate(90deg); }

.feature-tag {
  padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
}
.tag-new { color: var(--tag-new); background: var(--tag-new-bg); }
.tag-opt { color: var(--tag-opt); background: var(--tag-opt-bg); }
.tag-fix { color: var(--tag-fix); background: var(--tag-fix-bg); }
.tag-break { color: var(--tag-break); background: var(--tag-break-bg); }

.feature-title { font-size: 14px; font-weight: 600; color: var(--text-primary); flex-shrink: 0; }
.feature-summary { font-size: 13px; color: var(--text-secondary); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.feature-card.open .feature-summary { white-space: normal; }

.feature-detail { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
.feature-card.open .feature-detail { max-height: 500px; }

.feature-detail-inner {
  padding: 0 14px 12px 36px; font-size: 13px; color: var(--text-secondary); line-height: 1.7;
}

/* Compact feature */
.feature-compact {
  display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px;
  border-radius: 4px; cursor: pointer; transition: background var(--transition);
  flex-wrap: wrap;
}
.feature-compact:hover { background: var(--bg-hover); }

.feature-compact-title { font-size: 13px; color: var(--text-primary); flex: 1; min-width: 0; }

.feature-compact-detail {
  width: 100%; max-height: 0; overflow: hidden; transition: max-height 0.3s;
  font-size: 12px; color: var(--text-muted); padding-left: 60px; line-height: 1.6;
}
.feature-compact.open .feature-compact-detail { max-height: 300px; margin-top: 4px; }

/* Feature single (1-item groups) */
.feature-single {
  padding: 8px 10px; border-radius: 4px; margin-bottom: 4px;
}
.feature-single-title { font-size: 13px; color: var(--text-primary); margin-left: 8px; }
.feature-single-detail { display: block; font-size: 12px; color: var(--text-muted); margin-left: 60px; margin-top: 2px; line-height: 1.6; }

/* Component group */
.component-group { margin-bottom: 12px; }

.component-header {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; cursor: pointer; user-select: none;
  border-radius: var(--radius-sm); transition: background var(--transition);
}
.component-header:hover { background: var(--bg-hover); }

.component-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.component-count { font-size: 12px; color: var(--text-muted); }

.component-summary {
  padding: 0 10px 6px 36px; font-size: 12px; color: var(--text-muted); line-height: 1.5;
}

.component-items { padding-left: 16px; }
.component-items:not(.expanded) { display: none; }

/* Footer */
.footer {
  text-align: center; padding: 32px; color: var(--text-muted); font-size: 13px;
  border-top: 1px solid var(--border); margin-top: 80px;
}
.footer a { color: var(--accent); text-decoration: none; }

@media (max-width: 640px) {
  .header-inner { padding: 12px 16px; }
  .hero h1 { font-size: 28px; }
  .feature-title { font-size: 12px; }
  .feature-summary { display: none; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-icon">H</div>
      <div class="logo-text">Hermes Agent <span>Changelog</span></div>
    </div>
    <nav class="page-nav">
      <a href="index.html">← 全部项目</a>
      <a href="openclaw.html">OpenClaw</a>
    </nav>
  </div>
  <div class="month-nav-wrap">
    <div class="header-inner" style="padding-top:0">
      <nav class="month-nav" id="monthNav"></nav>
    </div>
  </div>
</header>

<main class="main">
  <div class="hero">
    <h1>What's New</h1>
    <p>Hermes Agent 的每一次进化，都在这里记录。新功能、优化与重要变更。</p>
  </div>
  <div id="changelog"></div>
</main>

<footer class="footer">
  <p>数据来源：<a href="https://github.com/NousResearch/hermes-agent/releases" target="_blank">GitHub Releases</a> · 自动构建于 <span id="buildDate"></span></p>
</footer>

<script src="hermes_data.js"></script>
<script>
(function() {
  const TAG_MAP = {
    '新功能':  { cls: 'tag-new',   label: '新功能' },
    '优化':    { cls: 'tag-opt',   label: '优化' },
    '修复':    { cls: 'tag-fix',   label: '修复' },
    '安全':    { cls: 'tag-fix',   label: '安全' },
    'Breaking':{ cls: 'tag-break', label: 'BREAKING' }
  };
  const CAT_ORDER = ['Breaking', '新功能', '安全', '修复', '优化'];

  // Adapt RELEASES_DATA (from hermes_data.js) to CHANGELOG_DATA format
  const CHANGELOG_DATA = (RELEASES_DATA || []).map(m => ({
    month: m.label,
    monthId: m.id,
    releases: m.releases.map(r => ({
      version: r.version,
      date: r.date,
      features: r.features.map(f => ({
        title: f.title,
        tag: f.tag,
        summary: f.summary,
        detail: f.detail,
        summaryZh: f.summaryZh || f.summary
      }))
    }))
  }));

  let currentMonthIdx = 0;

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  document.getElementById('buildDate').textContent = new Date().toLocaleDateString('zh-CN');

  function renderNav() {
    const nav = document.getElementById('monthNav');
    nav.innerHTML = CHANGELOG_DATA.map((m, i) =>
      `<a class="month-pill${i === currentMonthIdx ? ' active' : ''}" onclick="switchMonth(${i})">${m.month}</a>`
    ).join('');
  }

  window.switchMonth = function(idx) {
    currentMonthIdx = idx;
    renderNav();
    renderMonth();
  };

  function renderFeatureCard(f) {
    const tag = TAG_MAP[f.tag] || TAG_MAP['新功能'];
    return `
      <div class="feature-card" onclick="toggleCard(this)">
        <div class="feature-header">
          <span class="expand-icon">▶</span>
          <span class="feature-tag ${tag.cls}">${tag.label}</span>
          <span class="feature-title">${esc(f.title)}</span>
          <span class="feature-summary">${esc(f.summaryZh || f.summary)}</span>
        </div>
        <div class="feature-detail">
          <div class="feature-detail-inner">${esc(f.detail)}</div>
        </div>
      </div>`;
  }

  function extractComponent(title) {
    const colonM = title.match(/^([A-Za-z][\w/.-]*(?:\s+[A-Za-z][\w/.-]*)*)\s*[:：]\s/);
    if (colonM) {
      const prefix = colonM[1].trim();
      if (prefix.includes('/') || prefix.split(/\s+/).length <= 3) return prefix;
    }
    const wordM = title.match(/^([A-Z][a-zA-Z0-9]+(?:\/[A-Z][a-zA-Z0-9]+)*)/);
    return wordM ? wordM[1] : null;
  }

  function renderFeatureGroups(feats, dIdx) {
    const groups = new Map();
    for (const f of feats) {
      const comp = extractComponent(f.title) || 'Other';
      if (!groups.has(comp)) groups.set(comp, []);
      groups.get(comp).push(f);
    }

    if (groups.size <= 1 && feats.length <= 3) {
      return feats.map(f => {
        const tag = TAG_MAP[f.tag] || TAG_MAP['新功能'];
        const displayText = f.summaryZh || f.summary || f.title;
        return `<div class="feature-compact" onclick="this.classList.toggle('open')">
          <span class="feature-tag ${tag.cls}" style="font-size:10px">${tag.label}</span>
          <span class="feature-compact-title">${esc(displayText)}</span>
          <div class="feature-compact-detail">${esc(f.detail)}</div>
        </div>`;
      }).join('');
    }

    const expanded = dIdx === 0;
    return Array.from(groups.entries()).map(([comp, items]) => {
      const itemsHtml = items.map(f => {
        const tag = TAG_MAP[f.tag] || TAG_MAP['新功能'];
        const displayText = f.summaryZh || f.summary || f.title;
        return `<div class="feature-compact" onclick="this.classList.toggle('open')">
          <span class="feature-tag ${tag.cls}" style="font-size:10px">${tag.label}</span>
          <span class="feature-compact-title">${esc(displayText)}</span>
          <div class="feature-compact-detail">${esc(f.detail)}</div>
        </div>`;
      }).join('');

      if (items.length === 1) {
        const tag = TAG_MAP[items[0].tag] || TAG_MAP['新功能'];
        const displayText = items[0].summaryZh || items[0].summary || items[0].title;
        return `<div class="feature-single">
          <span class="feature-tag ${tag.cls}" style="font-size:10px">${tag.label}</span>
          <span class="feature-single-title">${esc(displayText)}</span>
          <span class="feature-single-detail">${esc(items[0].detail)}</span>
        </div>`;
      }

      const summaryText = items.slice(0, 3).map(f => f.summaryZh || f.summary || (f.detail || '').split(/[.。]/)[0]).join('；');

      return `<div class="component-group">
        <div class="component-header" onclick="toggleComponent(this)">
          <span class="toggle-icon${expanded ? ' expanded' : ''}">▶</span>
          <span class="component-name">${esc(comp)}</span>
          <span class="component-count">${items.length} 项</span>
        </div>
        <div class="component-summary">${esc(summaryText)}</div>
        <div class="component-items${expanded ? ' expanded' : ''}">
          ${itemsHtml}
        </div>
      </div>`;
    }).join('');
  }

  function renderMonth() {
    const container = document.getElementById('changelog');
    const month = CHANGELOG_DATA[currentMonthIdx];
    if (!month) { container.innerHTML = ''; return; }

    const releaseCount = month.releases.reduce((s, r) => s + r.features.length, 0);

    const dateMap = new Map();
    for (const r of month.releases) {
      if (!dateMap.has(r.date)) dateMap.set(r.date, []);
      dateMap.get(r.date).push(r);
    }
    const dates = Array.from(dateMap.keys()).sort((a, b) => b.localeCompare(a));

    const datesHtml = dates.map((date, dIdx) => {
      const releases = dateMap.get(date);
      const totalFeatures = releases.reduce((s, r) => s + r.features.length, 0);
      const versionList = releases.map(r => r.version).join(', ');

      const catMap = new Map();
      for (const r of releases) {
        for (const f of r.features) {
          const cat = f.tag || '新功能';
          if (!catMap.has(cat)) catMap.set(cat, []);
          catMap.get(cat).push(f);
        }
      }

      const catsHtml = CAT_ORDER
        .filter(cat => catMap.has(cat))
        .map((cat, cIdx) => {
          const feats = catMap.get(cat);
          const tag = TAG_MAP[cat] || TAG_MAP['新功能'];
          return `
            <div class="category-group">
              <div class="category-header" onclick="toggleCategory(this)">
                <span class="toggle-icon${dIdx === 0 ? ' expanded' : ''}">▶</span>
                <span class="category-label ${tag.cls}">${tag.label}</span>
                <span class="category-count">${feats.length} 项</span>
              </div>
              <div class="category-features${dIdx === 0 ? ' expanded' : ''}">
                ${renderFeatureGroups(feats, dIdx)}
              </div>
            </div>`;
        }).join('');

      return `
        <div class="date-group">
          <div class="date-header" onclick="toggleDate(this)">
            <span class="toggle-icon${dIdx === 0 ? ' expanded' : ''}">▶</span>
            <span class="date-label">${esc(date)}</span>
            <span class="date-count">${versionList} · ${totalFeatures} 项变更</span>
          </div>
          <div class="date-releases${dIdx === 0 ? ' expanded' : ''}">
            ${catsHtml}
          </div>
        </div>`;
    }).join('');

    container.innerHTML = `
      <section class="month-section" id="${month.monthId}">
        <div class="month-header">
          <span class="month-tag">${esc(month.month)}</span>
          <span class="month-count">${month.releases.length} 个版本 · ${releaseCount} 项变更</span>
        </div>
        <div class="month-content expanded">
          ${datesHtml}
        </div>
      </section>`;
  }

  window.toggleCard = function(el) { el.parentElement.classList.toggle('open'); };
  window.toggleDate = function(header) {
    header.nextElementSibling.classList.toggle('expanded');
    header.querySelector('.toggle-icon').classList.toggle('expanded');
  };
  window.toggleCategory = function(header) {
    header.nextElementSibling.classList.toggle('expanded');
    header.querySelector('.toggle-icon').classList.toggle('expanded');
  };
  window.toggleComponent = function(header) {
    header.nextElementSibling.classList.toggle('expanded');
    header.querySelector('.toggle-icon').classList.toggle('expanded');
  };

  renderNav();
  renderMonth();
})();
</script>

</body>
</html>
