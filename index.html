<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Changelog</title>
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #16161f;
  --bg-hover: #1c1c28;
  --bg-detail: #1a1a25;
  --border: #232333;
  --border-light: #2a2a3d;
  --text-primary: #e8e8ed;
  --text-secondary: #8b8ba0;
  --text-muted: #5c5c72;
  --accent: #6c5ce7;
  --accent-glow: rgba(108, 92, 231, 0.15);
  --tag-new: #00d68f;
  --tag-new-bg: rgba(0, 214, 143, 0.12);
  --tag-opt: #4da6ff;
  --tag-opt-bg: rgba(77, 166, 255, 0.12);
  --tag-fix: #ff9f43;
  --tag-fix-bg: rgba(255, 159, 67, 0.12);
  --tag-break: #ff6b6b;
  --tag-break-bg: rgba(255, 107, 107, 0.12);
  --radius: 10px;
  --radius-sm: 6px;
  --transition: 0.2s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ========== Header ========== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10, 10, 15, 0.82);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  max-width: 960px;
  margin: 0 auto;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -1px;
}

.logo-text {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}

.logo-text span {
  color: var(--text-muted);
  font-weight: 400;
  margin-left: 6px;
}

/* Month nav pills */
.month-nav {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.month-pill {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  text-decoration: none;
  transition: all var(--transition);
  white-space: nowrap;
}

.month-pill:hover {
  color: var(--text-primary);
  border-color: var(--accent);
  background: var(--accent-glow);
}

/* ========== Main Layout ========== */
.main {
  max-width: 960px;
  margin: 0 auto;
  padding: 48px 24px 120px;
}

/* ========== Hero ========== */
.hero {
  text-align: center;
  margin-bottom: 64px;
}

.hero h1 {
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e8e8ed, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
}

.hero p {
  font-size: 17px;
  color: var(--text-secondary);
  max-width: 520px;
  margin: 0 auto;
}

/* ========== Month Section ========== */
.month-section {
  margin-bottom: 72px;
  animation: fadeInUp 0.5s ease both;
}

.month-section:nth-child(2) { animation-delay: 0.1s; }
.month-section:nth-child(3) { animation-delay: 0.2s; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.month-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.month-tag {
  font-size: 28px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.3px;
}

.month-count {
  font-size: 14px;
  color: var(--text-muted);
  font-weight: 400;
}

/* ========== Release Subsection ========== */
.release-sub {
  margin-bottom: 32px;
}

.release-sub-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px dashed var(--border);
}

.release-version {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
}

.release-date {
  font-size: 13px;
  color: var(--text-muted);
}

/* ========== Feature Card ========== */
.feature-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.feature-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all var(--transition);
  overflow: hidden;
}

.feature-card:hover {
  border-color: var(--border-light);
  background: var(--bg-hover);
}

.feature-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

.feature-header:hover { background: rgba(255,255,255,0.015); }

.expand-icon {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: transform 0.25s ease;
  font-size: 12px;
}

.feature-card.open .expand-icon {
  transform: rotate(90deg);
}

.feature-tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.3px;
  text-transform: uppercase;
  flex-shrink: 0;
  white-space: nowrap;
}

.tag-new     { color: var(--tag-new);   background: var(--tag-new-bg); }
.tag-opt     { color: var(--tag-opt);   background: var(--tag-opt-bg); }
.tag-fix     { color: var(--tag-fix);   background: var(--tag-fix-bg); }
.tag-break   { color: var(--tag-break); background: var(--tag-break-bg); }

.feature-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  flex: 1;
  min-width: 0;
}

.feature-summary {
  font-size: 13px;
  color: var(--text-secondary);
  margin-left: auto;
  flex-shrink: 0;
  max-width: 45%;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.feature-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, padding 0.25s ease;
}

.feature-card.open .feature-detail {
  max-height: 500px;
}

.feature-detail-inner {
  padding: 0 20px 18px 52px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-secondary);
}

/* ========== Footer ========== */
.footer {
  text-align: center;
  padding: 40px 24px;
  color: var(--text-muted);
  font-size: 13px;
  border-top: 1px solid var(--border);
}

.footer a {
  color: var(--accent);
  text-decoration: none;
}

.footer a:hover { text-decoration: underline; }

/* ========== Responsive ========== */
@media (max-width: 768px) {
  .header-inner {
    flex-direction: column;
    gap: 12px;
    align-items: flex-start;
  }
  .version-nav {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .hero h1 { font-size: 28px; }
  .hero p { font-size: 15px; }
  .version-tag { font-size: 22px; }
  .feature-summary {
    display: none;
  }
  .feature-header {
    padding: 14px 16px;
  }
  .feature-detail-inner {
    padding-left: 48px;
    padding-right: 16px;
  }
}

@media (max-width: 480px) {
  .main { padding: 32px 16px 80px; }
  .feature-title { font-size: 14px; }
}

/* ========== Scrollbar ========== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
</style>
</head>

<!-- ========== RENDER ENGINE ========== -->
<script>
(function() {
  const TAG_MAP = {
    '新功能':  { cls: 'tag-new',   label: '新功能' },
    '优化':    { cls: 'tag-opt',   label: '优化' },
    '修复':    { cls: 'tag-fix',   label: '修复' },
    'Breaking':{ cls: 'tag-break', label: 'BREAKING' }
  };

  function renderNav() {
    const nav = document.getElementById('monthNav');
    nav.innerHTML = CHANGELOG_DATA.map(m =>
      `<a class="month-pill" href="#${m.monthId}">${m.month}</a>`
    ).join('');
  }

  function renderFeatureCard(f, i) {
    const tag = TAG_MAP[f.tag] || TAG_MAP['新功能'];
    return `
      <div class="feature-card" data-index="${i}">
        <div class="feature-header" onclick="toggleCard(this)">
          <span class="expand-icon">▶</span>
          <span class="feature-tag ${tag.cls}">${tag.label}</span>
          <span class="feature-title">${esc(f.title)}</span>
          <span class="feature-summary">${esc(f.summary)}</span>
        </div>
        <div class="feature-detail">
          <div class="feature-detail-inner">${esc(f.detail)}</div>
        </div>
      </div>`;
  }

  function renderChangelog() {
    const container = document.getElementById('changelog');
    container.innerHTML = CHANGELOG_DATA.map(month => {
      const releaseCount = month.releases.reduce((sum, r) => sum + r.features.length, 0);

      const releasesHtml = month.releases.map(release => {
        const features = release.features.map((f, i) => renderFeatureCard(f, i)).join('');
        return `
          <div class="release-sub" id="${release.version}">
            <div class="release-sub-header">
              <span class="release-version">${esc(release.version)}</span>
              <span class="release-date">${esc(release.date)}</span>
            </div>
            <div class="feature-list">${features}</div>
          </div>`;
      }).join('');

      return `
        <section class="month-section" id="${month.monthId}">
          <div class="month-header">
            <span class="month-tag">${esc(month.month)}</span>
            <span class="month-count">${month.releases.length} 个版本 · ${releaseCount} 项变更</span>
          </div>
          ${releasesHtml}
        </section>`;
    }).join('');
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  window.toggleCard = function(header) {
    const card = header.parentElement;
    card.classList.toggle('open');
  };

  // Init
  renderNav();
  renderChangelog();

  // Intersection observer for fade-in
  if ('IntersectionObserver' in window) {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.style.opacity = '1';
          e.target.style.transform = 'translateY(0)';
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.feature-card').forEach(card => {
      card.style.opacity = '0';
      card.style.transform = 'translateY(12px)';
      card.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
      observer.observe(card);
    });
  }
})();
</script>
