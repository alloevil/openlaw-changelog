<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Changelog</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #16161f;
  --bg-hover: #1c1c28;
  --border: #232333;
  --border-light: #2a2a3d;
  --text-primary: #e8e8ed;
  --text-secondary: #8b8ba0;
  --text-muted: #5c5c72;
  --accent: #6c5ce7;
  --accent-hermes: #00d68f;
  --radius: 12px;
  --transition: 0.2s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10, 10, 15, 0.82);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.header-inner {
  max-width: 960px; margin: 0 auto; padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
}

.logo-area { display: flex; align-items: center; gap: 12px; }

.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent-hermes));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: #fff;
}

.logo-text { font-size: 18px; font-weight: 600; color: var(--text-primary); }
.logo-text span { color: var(--text-muted); font-weight: 400; margin-left: 6px; }

.main {
  max-width: 960px; margin: 0 auto; padding: 80px 24px 120px;
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

.hero { text-align: center; margin-bottom: 64px; }
.hero h1 {
  font-size: 44px; font-weight: 700; letter-spacing: -0.5px;
  background: linear-gradient(135deg, #e8e8ed, #a78bfa, #00d68f);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}
.hero p { font-size: 17px; color: var(--text-secondary); max-width: 480px; margin: 0 auto; }

.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; width: 100%; }

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  text-decoration: none;
  color: inherit;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--card-accent, var(--accent));
  opacity: 0;
  transition: opacity var(--transition);
}

.card:hover {
  background: var(--bg-hover);
  border-color: var(--border-light);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.card:hover::before { opacity: 1; }

.card-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 700; color: #fff;
  margin-bottom: 20px;
}

.card h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.card p { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }

.card-meta {
  display: flex; gap: 16px; font-size: 12px; color: var(--text-muted);
}

.card-meta-item {
  display: flex; align-items: center; gap: 4px;
}

.card-arrow {
  position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
  font-size: 20px; color: var(--text-muted); transition: all var(--transition);
}

.card:hover .card-arrow { color: var(--text-primary); transform: translateY(-50%) translateX(4px); }

.footer {
  text-align: center; padding: 32px; color: var(--text-muted); font-size: 13px;
  border-top: 1px solid var(--border);
}
.footer a { color: var(--accent); text-decoration: none; }

@media (max-width: 640px) {
  .hero h1 { font-size: 32px; }
  .cards { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-icon">A</div>
      <div class="logo-text">Agent <span>Changelog</span></div>
    </div>
  </div>
</header>

<main class="main">
  <div class="hero">
    <h1>Agent Changelog</h1>
    <p>追踪主流 AI Agent 框架的版本更新与演进</p>
  </div>

  <div class="cards">
    <a class="card" href="openclaw.html" style="--card-accent: #6c5ce7">
      <div class="card-icon" style="background: linear-gradient(135deg, #6c5ce7, #a78bfa)">OC</div>
      <h2>OpenClaw</h2>
      <p>全能 AI Agent 运行时，支持多渠道接入、技能系统、子代理编排与持久记忆</p>
      <div class="card-meta">
        <span class="card-meta-item">📦 32+ 版本</span>
        <span class="card-meta-item">📅 2026.1 — 至今</span>
      </div>
      <span class="card-arrow">→</span>
    </a>

    <a class="card" href="hermes.html" style="--card-accent: #00d68f">
      <div class="card-icon" style="background: linear-gradient(135deg, #00d68f, #00b894)">H</div>
      <h2>Hermes Agent</h2>
      <p>Nous Research 出品的自主 AI Agent，支持多代理看板、跨会话记忆与技能自动生成</p>
      <div class="card-meta">
        <span class="card-meta-item">📦 12 版本</span>
        <span class="card-meta-item">📅 2026.3 — 至今</span>
      </div>
      <span class="card-arrow">→</span>
    </a>
  </div>
</main>

<footer class="footer">
  <p>数据来源：<a href="https://github.com/openclaw/openclaw/releases" target="_blank">OpenClaw</a> · <a href="https://github.com/NousResearch/hermes-agent/releases" target="_blank">Hermes Agent</a> · 自动构建</p>
</footer>

</body>
</html>
